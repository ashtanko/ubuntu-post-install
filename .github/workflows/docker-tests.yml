name: docker-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['22.04', '24.04', '25.04', '26.04']
        stage: [smoke, idempotency]
    name: ${{ matrix.stage }} / ubuntu-${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ matrix.ubuntu }}-${{ hashFiles('tests/Dockerfile') }}
          restore-keys: |
            buildx-${{ matrix.ubuntu }}-

      - name: Run ${{ matrix.stage }} on Ubuntu ${{ matrix.ubuntu }}
        run: bash tests/run-in-docker.sh ${{ matrix.ubuntu }} ${{ matrix.stage }}
