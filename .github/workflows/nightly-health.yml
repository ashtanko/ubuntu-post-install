name: nightly-health

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: bash tests/lint.sh

  manifest-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/check-manifest-coverage.sh

  report:
    needs: [shellcheck, manifest-coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-health';
            const failed = ${{ contains(needs.*.result, 'failure') }};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Tracks nightly project health failures',
                });
              } else {
                throw e;
              }
            }

            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            const existing = open[0];

            if (failed) {
              const body = `Nightly health run failed on ${today}.\n\nRun: ${runUrl}`;
              if (existing) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  ...context.repo,
                  title: `Nightly health check failing (since ${today})`,
                  labels: [label],
                  body,
                });
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: `Nightly health recovered on ${today}.\n\nRun: ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
